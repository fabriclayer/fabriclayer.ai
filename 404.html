<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Page Not Found — Fabric</title>
<meta name="description" content="The page you're looking for doesn't exist or has been moved.">
<meta name="robots" content="noindex">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
:root{--black:#000;--blue:#068cff;--pink:#fe83e0;--white:#fff;--text:#0a0a0a;--text-2:#555;--text-3:#999;--border:#e5e5e5;--sans:'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif;--mono:'DM Mono','SF Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--white);color:var(--text);font-family:var(--sans);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px;-webkit-font-smoothing:antialiased}
.code{font-family:var(--mono);font-size:0.78rem;color:var(--text-3);margin-bottom:12px}
h1{font-size:28px;font-weight:700;letter-spacing:-1px;line-height:1.2;margin-bottom:8px}
p{font-size:15px;color:var(--text-2);margin-bottom:32px;max-width:360px}
a{display:inline-block;font-family:var(--mono);font-size:0.78rem;background:var(--black);color:var(--white);padding:10px 24px;border-radius:8px;text-decoration:none;transition:background .15s}
a:hover{background:#222}
</style>
</head>
<body>
<div class="code">404</div>
<h1>Page not found</h1>
<p>The page you're looking for doesn't exist or has been moved.</p>
<a href="/">Back to Fabric</a>
</body>
</html>
